      <!-- Console capture: mirrors console.log output onto the page -->
      <script>
      (function(){
        var originalLog = console.log;
        var pending = [];
        console.log = function() {
          originalLog.apply(console, arguments);
          var line = Array.prototype.slice.call(arguments).map(function(a){
            return (typeof a === 'object') ? JSON.stringify(a) : String(a);
          }).join(' ');
          var el = document.getElementById('console-log');
          if (el) {
            el.textContent += line + '\n';
          } else {
            pending.push(line);
          }
        };
        window.addEventListener('DOMContentLoaded', function(){
          var el = document.getElementById('console-log');
          if (el && pending.length) {
            el.textContent += pending.join('\n') + '\n';
            pending = [];
          }
        });
      })();
      </script>
